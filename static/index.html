<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎤 Rap Bot</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #FFD700;
      --gold-dim: #b89900;
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --text: #f0f0f0;
      --muted: #555;
      --accent: #ff3c3c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    header {
      width: 100%;
      max-width: 760px;
      padding: 2.5rem 1.5rem 1rem;
      position: relative;
      z-index: 1;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 10vw, 5.5rem);
      letter-spacing: 0.05em;
      line-height: 1;
      color: var(--gold);
      text-shadow: 4px 4px 0 var(--accent), 8px 8px 0 #00000080;
    }

    .tagline {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 0.3rem;
    }

    .divider {
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), transparent);
      margin-top: 1.2rem;
    }

    /* Chat window */
    #chat-window {
      width: 100%;
      max-width: 760px;
      flex: 1;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      overflow-y: auto;
      min-height: 300px;
      max-height: 60vh;
      position: relative;
      z-index: 1;
    }

    .bubble {
      max-width: 80%;
      padding: 0.9rem 1.2rem;
      border-radius: 2px;
      font-size: 0.82rem;
      line-height: 1.7;
      animation: popIn 0.25s ease;
    }

    @keyframes popIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bubble.user {
      align-self: flex-end;
      background: var(--gold);
      color: #000;
      font-weight: 700;
      border-bottom-right-radius: 0;
      box-shadow: 3px 3px 0 var(--gold-dim);
    }

    .bubble.bot {
      align-self: flex-start;
      background: var(--surface2);
      color: var(--text);
      border-left: 3px solid var(--accent);
      border-bottom-left-radius: 0;
      white-space: pre-wrap;
    }

    .bubble.bot .speaker {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }

    /* Typing indicator */
    .typing {
      align-self: flex-start;
      display: flex;
      gap: 5px;
      padding: 0.8rem 1rem;
      background: var(--surface2);
      border-left: 3px solid var(--accent);
      border-radius: 2px;
    }
    .typing span {
      width: 7px; height: 7px;
      background: var(--gold);
      border-radius: 50%;
      animation: bounce 0.9s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Input area */
    .input-area {
      width: 100%;
      max-width: 760px;
      padding: 1rem 1.5rem 2rem;
      display: flex;
      gap: 0.7rem;
      position: relative;
      z-index: 1;
    }

    #user-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid #2a2a2a;
      border-bottom: 2px solid var(--gold);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.82rem;
      padding: 0.8rem 1rem;
      outline: none;
      border-radius: 2px;
      transition: border-color 0.2s;
    }
    #user-input:focus { border-bottom-color: var(--accent); }
    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      background: var(--gold);
      color: #000;
      border: none;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.1em;
      padding: 0 1.4rem;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.15s, transform 0.1s;
      box-shadow: 3px 3px 0 var(--gold-dim);
    }
    #send-btn:hover { background: #ffe033; }
    #send-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--gold-dim); }
    #send-btn:disabled { background: var(--muted); color: #333; cursor: not-allowed; box-shadow: none; }

    /* Scrollbar */
    #chat-window::-webkit-scrollbar { width: 4px; }
    #chat-window::-webkit-scrollbar-track { background: transparent; }
    #chat-window::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      margin: auto;
      letter-spacing: 0.1em;
    }
    .empty-state .mic { font-size: 2.5rem; display: block; margin-bottom: 0.8rem; }
  </style>
</head>
<body>

<header>
  <div class="logo">🎤 Rap Bot</div>
  <div class="tagline">Powered by Groq · Spits fire, 24/7</div>
  <div class="divider"></div>
</header>

<div id="chat-window">
  <div class="empty-state">
    <span class="mic">🎙️</span>
    Say something — the bot responds in bars.
  </div>
</div>

<div class="input-area">
  <input id="user-input" type="text" placeholder="Drop your line here..." autocomplete="off"/>
  <button id="send-btn">SEND</button>
</div>

<script>
  const chatWindow = document.getElementById('chat-window');
  const input = document.getElementById('user-input');
  const btn = document.getElementById('send-btn');
  let firstMessage = true;

  function addBubble(text, role) {
    if (firstMessage) {
      chatWindow.innerHTML = '';
      firstMessage = false;
    }
    const div = document.createElement('div');
    div.className = `bubble ${role}`;
    if (role === 'bot') {
      div.innerHTML = `<div class="speaker">🎤 RAP BOT</div>${escapeHtml(text)}`;
    } else {
      div.textContent = text;
    }
    chatWindow.appendChild(div);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showTyping() {
    if (firstMessage) { chatWindow.innerHTML = ''; firstMessage = false; }
    const t = document.createElement('div');
    t.className = 'typing';
    t.id = 'typing';
    t.innerHTML = '<span></span><span></span><span></span>';
    chatWindow.appendChild(t);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    btn.disabled = true;

    addBubble(text, 'user');
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      removeTyping();
      addBubble(data.reply, 'bot');
    } catch (e) {
      removeTyping();
      addBubble('Yo, something broke on the server. Try again! 🔧', 'bot');
    }

    btn.disabled = false;
    input.focus();
  }

  btn.addEventListener('click', sendMessage);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
